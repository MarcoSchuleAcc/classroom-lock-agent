<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classroom Lock — Teacher Dashboard</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a24;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text2: #8888a0;
    --accent: #a8d8ff;
    --green: #4ade80;
    --red: #ef4444;
    --yellow: #facc15;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface);
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  header h1 span { color: var(--accent); }
  header .sub {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
  }
  .header-actions {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .badge {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 0;
    background: var(--surface2);
    border: 1px solid var(--border);
  }
  .badge.online { border-color: var(--green); color: var(--green); }
  .badge.offline { border-color: var(--red); color: var(--red); }
  .classroom-id {
    display: inline-block;
    font-family: monospace;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 4px;
    padding: 6px 18px;
    background: var(--surface2);
    border: 2px solid var(--accent);
    color: var(--accent);
    cursor: pointer;
    user-select: all;
    transition: 0.15s;
  }
  .classroom-id:hover {
    background: rgba(168,216,255,0.1);
  }
  .classroom-id .label {
    display: block;
    font-size: 9px;
    font-weight: 400;
    letter-spacing: 2px;
    color: var(--text2);
    margin-bottom: 2px;
    text-transform: uppercase;
  }

  .container { max-width: 1200px; margin: 0 auto; padding: 24px 32px; width: 100%; }

  .action-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  button {
    background: rgba(0,0,0,0.5);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 18px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.15s;
    border-radius: 0;
  }
  button:hover { background: rgba(255,255,255,0.08); border-color: var(--text2); }
  button.danger { border-color: var(--red); color: var(--red); }
  button.danger:hover { background: rgba(239,68,68,0.15); }
  button.success { border-color: var(--green); color: var(--green); }
  button.success:hover { background: rgba(74,222,128,0.15); }
  button:disabled { opacity: 0.35; cursor: not-allowed; }

  .agent-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
  }

  .agent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 16px;
    transition: border-color 0.2s;
    position: relative;
  }
  .agent-card.online { border-left: 3px solid var(--green); }
  .agent-card.offline { border-left: 3px solid var(--red); opacity: 0.55; }
  .agent-card.locked { border-left: 3px solid var(--yellow); }
  .agent-card.noisy { border-left: 3px solid var(--red) !important; border-color: var(--red); }
  .agent-card.noise-gray {
    opacity: 0.4;
    border-left: 3px solid var(--text2) !important;
  }

  /* Lautstärke-Balken */
  .noise-bar-wrap {
    margin: 8px 0 6px 0;
    height: 4px;
    background: var(--surface2);
    overflow: hidden;
  }
  .noise-bar-fill {
    height: 100%;
    background: var(--green);
    transition: width 0.3s ease, background 0.3s ease;
    width: 0%;
  }
  .noise-bar-fill.warn { background: var(--yellow); }
  .noise-bar-fill.alert { background: var(--red); }
  .noise-bar-fill.off { background: var(--text2); }

  .noise-meta {
    font-size: 11px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .noise-meta .count {
    color: var(--text2);
  }
  .noise-meta .count strong {
    color: var(--red);
  }
  .noise-meta .status-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 4px;
  }
  .noise-meta .status-dot.silent { background: var(--green); }
  .noise-meta .status-dot.noisy { background: var(--red); animation: pulse 0.8s infinite; }
  .noise-meta .status-dot.aged { background: var(--text2); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  .agent-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 8px;
  }
  .agent-name {
    font-size: 14px;
    font-weight: 600;
    word-break: break-word;
  }
  .agent-hostname {
    font-size: 11px;
    color: var(--text2);
    margin-top: 1px;
  }
  .agent-status {
    font-size: 11px;
    padding: 2px 8px;
    border: 1px solid var(--border);
    white-space: nowrap;
  }
  .agent-status.online { border-color: var(--green); color: var(--green); }
  .agent-status.offline { border-color: var(--red); color: var(--red); }
  .agent-status.locked { border-color: var(--yellow); color: var(--yellow); }
  .agent-status.unlocked { border-color: var(--text2); color: var(--text2); }

  .agent-details {
    font-size: 11px;
    color: var(--text2);
    margin-bottom: 12px;
    line-height: 1.6;
  }
  .agent-details span { display: block; }

  .agent-actions {
    display: flex;
    gap: 6px;
  }
  .agent-actions button {
    flex: 1;
    padding: 6px 12px;
    font-size: 11px;
    text-align: center;
  }

  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
  }
  .empty-state svg { width: 48px; height: 48px; margin-bottom: 16px; opacity: 0.3; }
  .empty-state h3 { font-size: 16px; margin-bottom: 6px; color: var(--text); }
  .empty-state p { font-size: 13px; line-height: 1.6; }

  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 12px 20px;
    font-size: 13px;
    z-index: 999;
    animation: slideIn 0.25s ease;
    max-width: 360px;
  }
  .toast.error { border-color: var(--red); }
  .toast.success { border-color: var(--green); }
  @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  @media (max-width: 600px) {
    .container { padding: 16px; }
    header { padding: 16px; flex-direction: column; align-items: flex-start; gap: 12px; }
    .agent-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div>
    <h1>🔒 <span>Classroom Lock</span> — Teacher</h1>
    <div class="sub" id="server-info">Verbinde...</div>
  </div>
  <div class="header-actions">
    <div class="classroom-id" id="classroom-id-display" onclick="navigator.clipboard.writeText(this.innerText.split('\\n')[1])" title="Klicken zum Kopieren">
      <span class="label">Classroom-ID</span>
      ---
    </div>
    <span class="badge" id="agent-count-badge">0 Agents</span>
  </div>
</header>

<div class="container">
  <div class="action-bar">
    <button class="success" id="lock-all-btn" disabled>🔒 Alle sperren</button>
    <button id="unlock-all-btn" disabled>🔓 Alle entsperren</button>
    <button id="refresh-btn">↻ Aktualisieren</button>
  </div>

  <div id="agent-list">
    <div class="empty-state">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <rect x="3" y="11" width="18" height="11" rx="2" />
        <path d="M7 11V7a5 5 0 0110 0v4" />
      </svg>
      <h3>Warte auf Schüler-Agents</h3>
      <p>Starte den Classroom Lock Agent auf den Schüler-Laptops.<br>
      Sie erscheinen hier automatisch, sobald sie sich verbinden.</p>
    </div>
  </div>
</div>

<div id="toast-container"></div>

<script>
const WS_BASE = `${location.protocol === 'https:' ? 'wss:' : 'ws:'}//${location.host}`;
const API_BASE = location.origin;
let ws = null;

function toast(msg, type = 'info') {
  const c = document.getElementById('toast-container');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  c.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

async function fetchStatus() {
  let classroomId = '';
  try {
    const r = await fetch(`${API_BASE}/api/status`);
    const data = await r.json();
    renderAgents(data.agents);
    updateBadge(data.agents);
    classroomId = data.classroom_id || '';
  } catch(e) {
    console.error('Status fetch failed:', e);
    return [];
  }
  // Classroom-ID im Header aktualisieren
  const el = document.getElementById('classroom-id-display');
  if (el && classroomId) {
    el.innerHTML = '<span class="label">Classroom-ID</span>' + classroomId;
  }
  return data ? data.agents : [];
}

function renderAgents(agents) {
  const container = document.getElementById('agent-list');
  if (!agents || agents.length === 0) {
    container.innerHTML = `
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="11" width="18" height="11" rx="2" />
          <path d="M7 11V7a5 5 0 0110 0v4" />
        </svg>
        <h3>Keine Agents verbunden</h3>
        <p>Starte den Classroom Lock Agent auf den Schüler-Laptops.</p>
      </div>`;
    return;
  }

  let html = '<div class="agent-grid">';
  for (const a of agents) {
    const statusClass = a.online ? (a.locked ? 'locked' : 'online') : 'offline';
    const statusLabel = a.online ? (a.locked ? '🔒 Gesperrt' : '🔓 Offen') : '⚫ Offline';
    const lastSeen = a.lastSeen ? new Date(a.lastSeen * 1000).toLocaleTimeString() : '?';

    // Mikrofon / Lärm
    const mic = a.mic || { rms: 0, noisy: false, available: true, no_mic: false, error: '' };
    const micOk = mic.available !== false;
    const noMicHardware = mic.no_mic === true;
    const micError = mic.error || '';
    const rmsPct = Math.min(Math.round(mic.rms / 0.2 * 100), 100);
    const micBarClass = mic.noisy ? 'alert' : (rmsPct > 20 ? 'warn' : '');
    const noiseRecent = a.noiseRecent || false;
    const noiseCount = a.noiseCount || 0;
    const lastNoiseAgo = a.lastNoise > 0
      ? Math.round((Date.now() / 1000 - a.lastNoise))
      : null;

    // Card-Klasse: noisy ueberschreibt alles, sonst nach 10 Min ausgegraut
    const cardClasses = [statusClass];
    if (a.online && mic.noisy) cardClasses.push('noisy');
    else if (a.online && !noiseRecent && a.lastNoise > 0) cardClasses.push('noise-gray');

    // Status-Dot
    let dotClass = 'silent';
    let dotLabel = 'Leise';
    if (!micOk && a.online) { dotClass = 'aged'; dotLabel = '⛔ Kein Mikrofon'; }
    else if (a.online && mic.noisy) { dotClass = 'noisy'; dotLabel = '🔴 Laut!'; }
    else if (a.online && !noiseRecent && a.lastNoise > 0) { dotClass = 'aged'; dotLabel = '⏳ >=10 Min'; }

    let noiseExtra = '';
    if (!micOk && a.online) {
      noiseExtra = '<span style="color:var(--yellow)">⚠️ ' + escapeHtml(micError || 'Mikrofon nicht verfuegbar') + '</span>';
    } else if (noiseCount > 0) {
      noiseExtra = '<strong>' + noiseCount + 'x</strong> laut';
      if (lastNoiseAgo !== null) noiseExtra += ' · vor ' + lastNoiseAgo + 's';
    } else {
      noiseExtra = '\u2014';
    }

    // Mikrofon-Balken nur zeigen wenn verfügbar
    let noiseBarHtml = '';
    if (micOk && a.online) {
      noiseBarHtml = '<div class="noise-bar-wrap"><div class="noise-bar-fill ' + micBarClass + '" style="width:' + rmsPct + '%"></div></div>';
    }

    html += `
      <div class="agent-card ${cardClasses.join(' ')}" data-id="${a.id}">
        <div class="agent-header">
          <div>
            <div class="agent-name">${escapeHtml(a.name)}</div>
            <div class="agent-hostname">${escapeHtml(a.hostname || '')} · ${escapeHtml(a.ip || '')}</div>
          </div>
          <div class="agent-status ${statusClass}">${statusLabel}</div>
        </div>
        <div class="agent-details">
          <span>Letzte Meldung: ${lastSeen}</span>
          <span>ID: ${a.id.substring(0, 12)}...</span>
        </div>
        ${noiseBarHtml}
        <div class="noise-meta">
          <span class="count">${noiseExtra}</span>
          <span><span class="status-dot ${dotClass}"></span>${dotLabel}</span>
        </div>
        <div class="agent-actions">
          <button class="danger" onclick="lockAgent('${a.id}')" ${!a.online ? 'disabled' : ''}>🔒 Sperren</button>
          <button onclick="unlockAgent('${a.id}')" ${!a.online ? 'disabled' : ''}>🔓 Entsperren</button>
        </div>
      </div>`;
  }
  html += '</div>';
  container.innerHTML = html;
}

function updateBadge(agents) {
  const b = document.getElementById('agent-count-badge');
  const online = agents.filter(a => a.online).length;
  const total = agents.length;
  b.textContent = `${online}/${total} Online`;
  b.className = `badge ${online > 0 ? 'online' : 'offline'}`;

  document.getElementById('lock-all-btn').disabled = online === 0;
  document.getElementById('unlock-all-btn').disabled = online === 0;
}

function escapeHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

async function lockAgent(id) {
  try {
    const r = await fetch(`${API_BASE}/api/lock/${id}`, { method: 'POST' });
    const d = await r.json();
    if (d.success) toast(`✅ ${id.substring(0,8)}... gesperrt`, 'success');
    else toast(`❌ Fehler: ${d.error}`, 'error');
    fetchStatus();
  } catch(e) { toast('❌ Verbindungsfehler', 'error'); }
}

async function unlockAgent(id) {
  try {
    const r = await fetch(`${API_BASE}/api/unlock/${id}`, { method: 'POST' });
    const d = await r.json();
    if (d.success) toast(`✅ ${id.substring(0,8)}... entsperrt`, 'success');
    else toast(`❌ Fehler: ${d.error}`, 'error');
    fetchStatus();
  } catch(e) { toast('❌ Verbindungsfehler', 'error'); }
}

document.getElementById('lock-all-btn').onclick = async () => {
  try {
    const r = await fetch(`${API_BASE}/api/lock/all`, { method: 'POST' });
    const d = await r.json();
    toast(`✅ Alle ${d.results.length} gesperrt`, 'success');
    fetchStatus();
  } catch(e) { toast('❌ Fehler', 'error'); }
};

document.getElementById('unlock-all-btn').onclick = async () => {
  try {
    const r = await fetch(`${API_BASE}/api/unlock/all`, { method: 'POST' });
    const d = await r.json();
    toast(`🔓 Alle ${d.results.length} entsperrt`, 'success');
    fetchStatus();
  } catch(e) { toast('❌ Fehler', 'error'); }
};

document.getElementById('refresh-btn').onclick = () => fetchStatus();

function connectWebSocket() {
  ws = new WebSocket(`${WS_BASE}/ws/agent`);
  ws.onopen = () => {
    document.getElementById('server-info').textContent = `Verbunden · ${location.hostname}`;
  };
  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type === 'registered' || msg.type === 'status') {
        fetchStatus();
      }
    } catch(_) {}
  };
  ws.onclose = () => {
    document.getElementById('server-info').textContent = 'WebSocket getrennt — versuche Neuverbindung...';
    setTimeout(connectWebSocket, 3000);
  };
  ws.onerror = () => ws.close();
}

// Init
fetchStatus();
connectWebSocket();
// Poll every 3s as backup
setInterval(fetchStatus, 3000);
</script>

</body>
</html>
